<!DOCTYPE html>
<html>
<head>
    <title>Bookavy</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;

            background:
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            color: white;
        }

        .container {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            padding: 25px;
            height: 100vh;

            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);

            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar p {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar p:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Main */
        .main {
            flex: 1;
            padding: 40px;
        }

        /* Hero Section */
        .hero {
            margin-bottom: 30px;
            max-width: 500px;
        }

        .hero h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .hero p {
            color: #ddd;
        }

        /* Search */
        .search {
            width: 60%;
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            backdrop-filter: blur(10px);
            outline: none;
            margin-bottom: 20px;
        }

        /* Form */
        .form {
            padding: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            width: 350px;
        }

        .form input {
            display: block;
            margin: 10px 0;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            border: none;
        }

        /* Buttons */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            margin: 5px;
            cursor: pointer;
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            color: white;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Books Grid */
        .books {
            display: flex;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);

            width: 220px;
            padding: 15px;
            margin: 15px;

            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);

            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card h4 {
            margin: 10px 0 5px;
        }

        .card button {
            margin-top: 5px;
            padding: 6px 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .cart {
            background: #4CAF50;
            color: white;
        }

        .delete {
            background: #f44336;
            color: white;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>📚 Bookavy</h2>
        <p>👤 Profile</p>
        <p>📦 Orders</p>
        <p>❤️ Favorites</p>
        <p>⚙️ Settings</p>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Hero -->
        <div class="hero">
            <h1>Discover Your Next Book</h1>
            <p>Explore, organize, and manage your reading journey beautifully.</p>
        </div>

        <!-- Search -->
        <input type="text" class="search" placeholder="🔍 Search books..." onkeyup="searchBooks()">

        <h2>Select a Book</h2>

        <!-- Form -->
        <div class="form">
            <input type="text" id="title" placeholder="Enter title">
            <input type="text" id="author" placeholder="Enter author">

            <button class="btn" onclick="addBook()">Add Book</button>
            <button class="btn" onclick="viewBooks()">View Books</button>
        </div>

        <!-- Books -->
        <div id="bookList" class="books"></div>

    </div>

</div>

<script>

let allBooks = [];

async function addBook() {
    const title = document.getElementById("title").value;
    const author = document.getElementById("author").value;

    const book = {
        title: title,
        author: author,
        price: 499,
        category: "General",
        status: "Currently Reading"
    };

    await fetch("http://localhost:8082/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(book)
    });

    alert("Book Added!");
    viewBooks();
}

async function viewBooks() {
    const res = await fetch("http://localhost:8082/books");
    const data = await res.json();

    allBooks = data;
    displayBooks(data);
}

function displayBooks(books) {
    let output = "";

    books.forEach(book => {
        output += `
        <div class="card">
            <img src="https://covers.openlibrary.org/b/title/${book.title}-M.jpg"
                 onerror="this.src='https://via.placeholder.com/150'">

            <h4>${book.title}</h4>
            <p>${book.author}</p>
            <p>₹${book.price}</p>
            <p>${book.status}</p>

            <button class="cart" onclick="addToCart(${book.id})">🛒</button>
            <button class="delete" onclick="deleteBook(${book.id})">❌</button>
        </div>
        `;
    });

    document.getElementById("bookList").innerHTML = output;
}

function searchBooks() {
    const text = document.querySelector(".search").value.toLowerCase();

    const filtered = allBooks.filter(book =>
        book.title.toLowerCase().includes(text) ||
        book.author.toLowerCase().includes(text)
    );

    displayBooks(filtered);
}

async function addToCart(id) {
    await fetch("http://localhost:8082/cart/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            bookId: id,
            quantity: 1
        })
    });

    alert("Added to Cart!");
}

async function deleteBook(id) {
    await fetch(`http://localhost:8082/books/${id}`, {
        method: "DELETE"
    });

    alert("Deleted!");
    viewBooks();
}

</script>

</body>
</html>
